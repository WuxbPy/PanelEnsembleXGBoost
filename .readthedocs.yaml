# Read the Docs configuration for PanelEnsembleXGBoost
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    pre_install:
      - python -m pip install --upgrade pip

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false

python:
  install:
    # 安装项目本身（含所有运行时依赖），确保 autodoc 能成功导入模块
    - method: pip
      path: .
      extra_requirements:
        - docs
